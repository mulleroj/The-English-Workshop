    <!-- Open Graph -->
    <meta property="og:title" content="The English Workshop – slovíčka k Maturita Solutions">

    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="The English Workshop – slovíčka k Maturita Solutions">

    <!-- Icons -->
    <link rel="icon" href="/icons/icon-192.png">
    <link rel="apple-touch-icon" href="/icons/icon-512.png">
    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#09090b">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-title" content="ENG Workshop">

    <style>
      /* INDUSTRIAL BACKGROUND ENFORCEMENT */
      body {
        /* Zkousime jednoduchou cestu k obrazku v korenovem adresari */
        background-image: linear-gradient(rgba(18, 18, 18, 0.90), rgba(18, 18, 18, 0.90)), url('./background-workshop.jpg') !important;
        background-size: cover !important;
        background-attachment: fixed !important;
        background-position: center !important;
        background-repeat: no-repeat !important;
        min-height: 100vh !important;
        background-color: #1a1a1a !important; /* Zalozni barva */
        margin: 0;
        padding: 0;
        color: #e4e4e7; /* Zinc-200 */
      }
      
      /* Pojistka pro pruhlednost ostatnich vrstev */
      html, #root, #app, .App {
        background-color: transparent !important;
        min-height: 100vh;
      }

      /* 3D Flip Utilities */
      .perspective-1000 {
        perspective: 1000px;
      }
      .transform-style-3d {
        transform-style: preserve-3d;
      }
      .backface-hidden {
        backface-visibility: hidden;
      }
      .rotate-y-180 {
        transform: rotateY(180deg);
      }
    </style>
    <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('SW registered:', reg.scope))
          .catch(err => console.warn('SW registration failed:', err));
      });
    }
  </script>
</body>
